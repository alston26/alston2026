<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alston Chen — Contact</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#0c0a18;--surface:#161230;--border:rgba(210,195,240,0.1);--text:#e2dfd8;--text-muted:#a99ec4;--accent:#c4b0e0;--heading:'Cormorant Garamond',Georgia,serif;--body:'Outfit',sans-serif;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:var(--body);background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}
    body::after{content:'';position:fixed;inset:0;z-index:99990;pointer-events:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");opacity:0.5;}
    nav{position:fixed;top:0;width:100%;z-index:1000;padding:1.2rem 3rem;display:flex;justify-content:space-between;align-items:center;background:rgba(12,10,24,0.7);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
    .logo{font-family:var(--heading);font-size:1.8rem;font-weight:700;color:var(--accent);text-decoration:none;}
    nav ul{list-style:none;display:flex;gap:2.5rem;}
    nav ul a{color:var(--text-muted);text-decoration:none;font-size:0.8rem;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;transition:color 0.3s;}
    nav ul a:hover{color:var(--accent);}

    .contact-section{flex:1;display:flex;align-items:center;justify-content:center;padding:8rem 2rem 4rem;}
    .contact-inner{max-width:500px;width:100%;text-align:center;}
    .section-label{font-size:0.7rem;text-transform:uppercase;letter-spacing:0.25em;color:var(--accent);margin-bottom:1rem;}
    .contact-inner h1{font-family:var(--heading);font-size:3.2rem;font-weight:700;margin-bottom:0.8rem;opacity:0;animation:fadeUp 0.8s 0.2s ease forwards;}
    .contact-inner .sub{color:var(--text-muted);font-weight:300;margin-bottom:3rem;opacity:0;animation:fadeUp 0.8s 0.4s ease forwards;}
    .info-block{text-align:left;margin-bottom:2.5rem;opacity:0;animation:fadeUp 0.8s 0.6s ease forwards;}
    .info-row{display:flex;justify-content:space-between;align-items:center;padding:1.2rem 0;border-bottom:1px solid var(--border);transition:padding-left 0.3s;}
    .info-row:hover{padding-left:8px;}
    .info-row .label{font-size:0.7rem;text-transform:uppercase;letter-spacing:0.12em;color:var(--text-muted);}
    .info-row .value{font-size:0.95rem;}
    .info-row .value a{color:var(--accent);text-decoration:none;transition:opacity 0.3s;}
    .info-row .value a:hover{opacity:0.7;}
    .social-links{display:flex;justify-content:center;gap:2rem;opacity:0;animation:fadeUp 0.8s 0.8s ease forwards;}
    .social-links a{color:var(--text-muted);text-decoration:none;font-size:0.82rem;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;position:relative;transition:color 0.3s;}
    .social-links a::after{content:'';position:absolute;bottom:-3px;left:0;width:0;height:1px;background:var(--accent);transition:width 0.4s;}
    .social-links a:hover{color:var(--accent);}
    .social-links a:hover::after{width:100%;}

    footer{padding:2rem;text-align:center;border-top:1px solid var(--border);font-size:0.8rem;color:var(--text-muted);}
    @keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
    @media(max-width:768px){nav{padding:1rem 1.5rem;}}
  </style>
</head>
<body>
  <nav>
    <a href="index.html" class="logo">Alston Chen</a>
    <ul>
      <li><a href="index.html#about">About</a></li>
      <li><a href="projects.html">Projects</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>
  <section class="contact-section">
    <div class="contact-inner">
      <div class="section-label" style="opacity:0;animation:fadeUp 0.8s ease forwards;">Get in Touch</div>
      <h1>Let's Connect</h1>
      <p class="sub">Open to opportunities, collaborations, and conversations.</p>
      <div class="info-block">
        <div class="info-row"><span class="label">Email</span><span class="value"><a href="mailto:achen26@amherst.edu">achen26@amherst.edu</a></span></div>
        <div class="info-row"><span class="label">Phone</span><span class="value">203-772-9692</span></div>
        <div class="info-row"><span class="label">Location</span><span class="value">Amherst, MA</span></div>
      </div>
      <div class="social-links">
        <a href="https://github.com/alston26" target="_blank">GitHub</a>
        <a href="https://alston26.github.io/alston2026" target="_blank">Website</a>
      </div>
    </div>
  </section>
  <footer><p>© 2026 Alston Chen</p></footer>
</body>
</html>

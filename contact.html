<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alston Chen — Contact</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#0a0a0a;--surface:#141414;--border:#222;--text:#e8e4de;--text-muted:#8a8580;--accent:#d4a54a;--heading:'Playfair Display',Georgia,serif;--body:'DM Sans',sans-serif;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:var(--body);background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh;display:flex;flex-direction:column;}
    body::before{content:'';position:fixed;inset:0;z-index:9999;pointer-events:none;background:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");opacity:0.4;}
    nav{position:fixed;top:0;width:100%;z-index:100;padding:1.5rem 3rem;display:flex;justify-content:space-between;align-items:center;background:rgba(10,10,10,0.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);}
    nav .logo{font-family:var(--heading);font-size:1.4rem;font-weight:900;color:var(--accent);text-decoration:none;}
    nav ul{list-style:none;display:flex;gap:2rem;}
    nav ul a{color:var(--text-muted);text-decoration:none;font-size:0.85rem;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;transition:color 0.3s;}
    nav ul a:hover{color:var(--accent);}

    .contact-section{flex:1;display:flex;align-items:center;justify-content:center;padding:8rem 2rem 4rem;}
    .contact-inner{max-width:480px;width:100%;text-align:center;}
    .section-label{font-size:0.75rem;text-transform:uppercase;letter-spacing:0.2em;color:var(--accent);margin-bottom:1rem;}
    .contact-inner h1{font-family:var(--heading);font-size:2.8rem;font-weight:900;margin-bottom:0.8rem;}
    .contact-inner .sub{color:var(--text-muted);margin-bottom:2.5rem;}
    .info-block{text-align:left;margin-bottom:2rem;}
    .info-row{display:flex;justify-content:space-between;padding:1rem 0;border-bottom:1px solid var(--border);}
    .info-row .label{font-size:0.75rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-muted);}
    .info-row .value a{color:var(--accent);text-decoration:none;}
    .info-row .value{font-size:0.95rem;}
    .social-links{display:flex;justify-content:center;gap:1.5rem;margin-top:2rem;}
    .social-links a{color:var(--text-muted);text-decoration:none;font-size:0.85rem;font-weight:500;letter-spacing:0.05em;transition:color 0.3s;}
    .social-links a:hover{color:var(--accent);}

    footer{padding:2rem;text-align:center;border-top:1px solid var(--border);font-size:0.8rem;color:var(--text-muted);}
  </style>
</head>
<body>
  <nav>
    <a href="index.html" class="logo">AC</a>
    <ul>
      <li><a href="index.html#about">About</a></li>
      <li><a href="projects.html">Projects</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>

  <section class="contact-section">
    <div class="contact-inner">
      <div class="section-label">Get in Touch</div>
      <h1>Let's Connect</h1>
      <p class="sub">Open to opportunities, collaborations, and conversations.</p>
      <div class="info-block">
        <div class="info-row">
          <span class="label">Email</span>
          <span class="value"><a href="mailto:achen26@amherst.edu">achen26@amherst.edu</a></span>
        </div>
        <div class="info-row">
          <span class="label">Phone</span>
          <span class="value">203-772-9692</span>
        </div>
        <div class="info-row">
          <span class="label">Location</span>
          <span class="value">Amherst, MA</span>
        </div>
      </div>
      <div class="social-links">
        <a href="https://github.com/alston26" target="_blank">GitHub</a>
        <a href="https://alston26.github.io/alston2026" target="_blank">Website</a>
      </div>
    </div>
  </section>

  <footer><p>© 2026 Alston Chen</p></footer>
</body>
</html>

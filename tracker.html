<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Habit Tracker — Alston Chen</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@700&family=Outfit:wght@300;400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#08090c;--surface:#111318;--surface2:#181b22;--border:rgba(255,255,255,0.06);--text:#e2dfd8;--text-muted:#7D99AA;--accent:#FFC067;--accent2:#66F4FF;--accent-glow:rgba(255,192,103,0.15);--green:#4aba6a;--heading:'Cormorant Garamond',Georgia,serif;--body:'Outfit',sans-serif;--mono:'JetBrains Mono',monospace;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:var(--body);background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}
    body::after{content:'';position:fixed;inset:0;z-index:99990;pointer-events:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");opacity:0.5;}
    nav{width:100%;padding:1.2rem 3rem;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);}
    .logo{font-family:var(--heading);font-size:1.8rem;font-weight:700;color:var(--accent);text-decoration:none;}
    nav a.back{color:var(--text-muted);text-decoration:none;font-size:0.8rem;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;transition:color 0.3s;}
    nav a.back:hover{color:var(--accent);}

    .app{flex:1;display:flex;flex-direction:column;align-items:center;padding:2rem;gap:1.5rem;max-width:700px;margin:0 auto;width:100%;}
    h1{font-family:var(--heading);font-size:2.5rem;opacity:0;animation:fu .6s .1s ease forwards;}
    .desc{font-size:0.88rem;color:var(--text-muted);text-align:center;font-weight:300;opacity:0;animation:fu .6s .2s ease forwards;}

    .add-habit{display:flex;gap:0.5rem;width:100%;opacity:0;animation:fu .6s .3s ease forwards;}
    .add-habit input{flex:1;padding:0.7rem 1rem;background:var(--surface);border:1px solid var(--border);border-radius:50px;color:var(--text);font-family:var(--body);font-size:0.85rem;outline:none;transition:border-color 0.3s;}
    .add-habit input:focus{border-color:var(--accent);}
    .add-habit input::placeholder{color:var(--text-muted);}
    .add-habit button{padding:0.7rem 1.5rem;background:var(--accent);color:#0a0a0a;border:none;border-radius:50px;font-family:var(--body);font-size:0.82rem;font-weight:600;cursor:pointer;transition:transform 0.3s,box-shadow 0.3s;white-space:nowrap;}
    .add-habit button:hover{transform:translateY(-2px);box-shadow:0 6px 20px var(--accent-glow);}

    .week-header{display:grid;grid-template-columns:1fr repeat(7,44px) 50px;gap:4px;width:100%;padding:0 0.5rem;font-size:0.65rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.1em;text-align:center;opacity:0;animation:fu .6s .35s ease forwards;}
    .week-header span:first-child{text-align:left;}

    .habits{width:100%;display:flex;flex-direction:column;gap:0.5rem;opacity:0;animation:fu .6s .4s ease forwards;}
    .habit-row{display:grid;grid-template-columns:1fr repeat(7,44px) 50px;gap:4px;align-items:center;padding:0.6rem 0.5rem;background:var(--surface);border:1px solid var(--border);border-radius:8px;transition:border-color 0.3s;}
    .habit-row:hover{border-color:rgba(255,192,103,0.2);}
    .habit-name{font-size:0.88rem;font-weight:500;display:flex;align-items:center;gap:0.5rem;min-width:0;}
    .habit-name span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .habit-name .delete{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:0.75rem;opacity:0;transition:opacity 0.3s,color 0.3s;padding:2px 4px;}
    .habit-row:hover .delete{opacity:1;}
    .delete:hover{color:#e05555!important;}

    .day-cell{width:44px;height:36px;border-radius:6px;background:var(--surface2);border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.25s cubic-bezier(0.25,0.8,0.25,1);font-size:0.85rem;}
    .day-cell:hover{border-color:var(--accent);transform:scale(1.1);}
    .day-cell.done{background:var(--accent);border-color:var(--accent);transform:scale(1);}
    .day-cell.done:hover{opacity:0.8;}
    .day-cell.today{border-color:var(--accent2);box-shadow:0 0 8px rgba(102,244,255,0.2);}

    .streak{font-family:var(--mono);font-size:0.75rem;color:var(--accent);text-align:center;}

    .summary{width:100%;padding:1.5rem;background:var(--surface);border:1px solid var(--border);border-radius:8px;display:flex;justify-content:space-around;text-align:center;opacity:0;animation:fu .6s .45s ease forwards;}
    .summary .stat .num{font-family:var(--heading);font-size:2rem;font-weight:700;color:var(--accent);}
    .summary .stat .lbl{font-size:0.7rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.08em;}

    .empty-state{color:var(--text-muted);font-size:0.9rem;padding:3rem;text-align:center;font-weight:300;}

    @keyframes fu{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
    @media(max-width:600px){
      .week-header,.habit-row{grid-template-columns:1fr repeat(7,32px) 40px;}
      .day-cell{width:32px;height:28px;font-size:0.7rem;}
      .app{padding:1rem;}
    }
  </style>
</head>
<body>
  <nav><a href="index.html" class="logo">AC</a><a href="projects.html" class="back">← Projects</a></nav>
  <div class="app">
    <h1>Habit Tracker</h1>
    <p class="desc">Track your daily habits for the week. Click cells to mark complete. Data saves in your browser.</p>

    <div class="add-habit">
      <input type="text" id="habitInput" placeholder="Add a new habit..." maxlength="30">
      <button onclick="addHabit()">Add</button>
    </div>

    <div class="week-header" id="weekHeader"></div>
    <div class="habits" id="habits"></div>

    <div class="summary">
      <div class="stat"><div class="num" id="totalHabits">0</div><div class="lbl">Habits</div></div>
      <div class="stat"><div class="num" id="todayDone">0</div><div class="lbl">Done Today</div></div>
      <div class="stat"><div class="num" id="weekPct">0%</div><div class="lbl">This Week</div></div>
    </div>
  </div>

  <script>
    const DAYS=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
    let habits=JSON.parse(localStorage.getItem('ac_habits')||'[]');

    // Get current week's dates (Mon-Sun)
    function getWeekDates(){
      const now=new Date(),day=now.getDay(),diff=now.getDate()-day+(day===0?-6:1);
      return Array.from({length:7},(_,i)=>{const d=new Date(now);d.setDate(diff+i);return d;});
    }

    function dateKey(d){return d.toISOString().slice(0,10);}
    function isToday(d){return dateKey(d)===dateKey(new Date());}

    function save(){localStorage.setItem('ac_habits',JSON.stringify(habits));}

    function addHabit(){
      const input=document.getElementById('habitInput'),name=input.value.trim();
      if(!name)return;
      habits.push({id:Date.now(),name,completed:{}});
      input.value='';save();render();
    }

    document.getElementById('habitInput').addEventListener('keydown',e=>{if(e.key==='Enter')addHabit();});

    function deleteHabit(id){
      habits=habits.filter(h=>h.id!==id);save();render();
    }

    function toggleDay(habitId,dateStr){
      const h=habits.find(h=>h.id===habitId);
      if(!h)return;
      h.completed[dateStr]=!h.completed[dateStr];
      if(!h.completed[dateStr])delete h.completed[dateStr];
      save();render();
    }

    function getStreak(habit){
      let streak=0,d=new Date();
      while(true){
        const k=dateKey(d);
        if(habit.completed[k])streak++;
        else if(streak>0||!isToday(d))break;
        d.setDate(d.getDate()-1);
      }
      return streak;
    }

    function render(){
      const dates=getWeekDates(),today=dateKey(new Date());

      // Week header
      const wh=document.getElementById('weekHeader');
      wh.innerHTML='<span>Habit</span>'+dates.map(d=>`<span style="${isToday(d)?'color:var(--accent2)':''}">${DAYS[d.getDay()===0?6:d.getDay()-1]}<br>${d.getDate()}</span>`).join('')+'<span>🔥</span>';

      // Habits
      const container=document.getElementById('habits');
      if(habits.length===0){container.innerHTML='<div class="empty-state">No habits yet. Add one above to get started!</div>';updateSummary(dates);return;}

      container.innerHTML=habits.map(h=>{
        const cells=dates.map(d=>{
          const k=dateKey(d),done=h.completed[k];
          return `<div class="day-cell${done?' done':''}${isToday(d)?' today':''}" onclick="toggleDay(${h.id},'${k}')">${done?'✓':''}</div>`;
        }).join('');
        const streak=getStreak(h);
        return `<div class="habit-row">
          <div class="habit-name"><button class="delete" onclick="deleteHabit(${h.id})">✕</button><span>${h.name}</span></div>
          ${cells}
          <div class="streak">${streak>0?streak+'d':'-'}</div>
        </div>`;
      }).join('');

      updateSummary(dates);
    }

    function updateSummary(dates){
      const today=dateKey(new Date());
      document.getElementById('totalHabits').textContent=habits.length;
      document.getElementById('todayDone').textContent=habits.filter(h=>h.completed[today]).length;
      const totalCells=habits.length*7;
      const doneCells=habits.reduce((sum,h)=>sum+dates.filter(d=>h.completed[dateKey(d)]).length,0);
      document.getElementById('weekPct').textContent=totalCells?Math.round(doneCells/totalCells*100)+'%':'0%';
    }

    render();
  </script>
</body>
</html>
